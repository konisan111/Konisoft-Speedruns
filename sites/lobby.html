<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Konisoft is an independent indie game studio located in Hungary, developing games in multiple genres to keep gamers happy and entertained.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@200..800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style/lobby.css">
    <link id="theme-css" rel="stylesheet" href="../style/dark-theme.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script type="module" src="../scripts/main/lobby.js"></script>
    <title>Konisoft | Welcome to the official Konisoft website</title>
    <link rel="icon" href="../images/favicon.png" type="image/x-icon" />
    <meta property="og:type" content="website">
    <meta property="og:title" content="Konisoft | Welcome to the official Konisoft website">
</head>
<body>
    <header>
        <nav>
            <div id="header-logo"></div>
            <div id="nav-buttons">
                <div id="menu-buttons">
                    <a href="#" class="menu-button" id="nav-upload">Upload your time</a>
                    <div id="nav-split"></div>
                    <a href="#" class="menu-button" id="nav-home">Leaderboard</a>
                    <div id="nav-split"></div>
                    <a href="#" class="menu-button" id="nav-profile">Profile</a>
                    <div id="nav-split"></div>
                </div>
                <div id="theme-and-settings">
                    <div id="language"></div>
                    <div id="nav-split"></div>
                    <div id="theme-switcher"></div>
                    <div id="settings-mobile"></div>
                </div>
            </div>
        </nav>
        <div id="dropdown-menu">
            <a href="#" class="dropdown-menu-button" id="nav-upload-mobile">Upload your time</a>
            <a href="#" class="dropdown-menu-button" id="nav-home-mobile">Leaderboard</a>
            <a href="#" class="dropdown-menu-button" id="nav-profile-mobile">Profile</a>
            <div id="dropdown-menu-icons">
                <div id="language-mobile"></div>
                <div id="theme-switcher-mobile"></div>
            </div>
        </div>
    </header>

    <main>
        <div id="leaderboard-container">
            <div id="leaderboard-top-header">
                <div id="leaderboard-main-title-container">
                    <h1 id="leaderboard-main-title">Leaderboard</h1>
                    <span id="leaderboard-scope">global</span>
                </div>
                <div id="leaderboard-filters">
                    <div class="custom-dropdown">
                        <button class="custom-dropdown-header">
                            <div class="dropdown-icon">▼</div>
                            <div class="dropdown-text" id="opt-nation">by nation</div>
                        </button>
                        <div class="custom-dropdown-list">
                            <div class="custom-dropdown-item" id="opt-nation-1">Global</div>
                            <div class="custom-dropdown-item" id="opt-nation-2">Hungary</div>
                        </div>
                    </div>
                    <div class="custom-dropdown">
                        <button class="custom-dropdown-header">
                            <div class="dropdown-icon">▼</div>
                            <div class="dropdown-text" id="opt-time">by time</div>
                        </button>
                        <div class="custom-dropdown-list">
                            <div class="custom-dropdown-item" id="opt-time-1">All Time</div>
                            <div class="custom-dropdown-item" id="opt-time-2">Monthly</div>
                        </div>
                    </div>
                    <div class="custom-dropdown">
                        <button class="custom-dropdown-header">
                            <div class="dropdown-icon">▼</div>
                            <div class="dropdown-text" id="opt-game">by game</div>
                        </button>
                        <div class="custom-dropdown-list">
                            <div class="custom-dropdown-item" id="opt-game-1">All Games</div>
                            <div class="custom-dropdown-item" id="opt-game-2">Lumi Dungeon of Dreadspire</div>
                        </div>
                    </div>
                </div>
            </div>

            <div id="leaderboard-titlebar">
                <div id="leaderboard-profile-title">Profile</div>
                <div id="leaderboard-country-title">Country</div>
                <div id="leaderboard-game-title">Game</div>
                <div id="leaderboard-date-title">Date</div>
                <div id="leaderboard-time-title">Time</div>
            </div>

            <div id="leaderboard-card-container">
            </div>
        </div>

        <div id="profile-container" class="hidden">
            <div id="profile-header">
                <div id="profile-picture"></div>
                <h2 id="profile-username" data-i18n="username">User1234</h2>
                <div id="profile-creation-date"><span id="profile-member-since">Member since:</span> 2024.01.15</div>
                <div id="profile-country-info">
                    <div id="profile-flag"></div>
                    <span id="profile-country-name-static">Hungary</span>
                </div>
            </div>

            <div id="profile-mini-leaderboard">
                <h3 id="profile-mini-title">Leaderboard</h3>
                <div id="mini-leaderboard-cards">
                </div>
                <button id="profile-logout-button">Logout</button>
            </div>
        </div>
    </main>

    <footer>
        <div id="footer-logo"></div>
        <div id="footer-text-1" class="text-loading"></div>
        <div id="footer-text-2" class="text-loading"></div>
        <div id="footer-text-3" class="text-loading"></div>
    </footer>
</body>
</html>
