<body>
    <div class="grid"></div>
    <main>
        <div id="container" class="fade-in">
            <div id="logo"></div>
            
            <label id="username-label" for="username-input" style="display: none;">Username</label>
            <input id="username-input" type="text" placeholder="" style="display: none;">

            <label id="email-label" for="email-input">Email or username</label>
            <input id="email-input" type="email" placeholder="example@speedruns.com">
            
            <div id="password-labels">
                <label id="password-label" for="password-input">Password</label>
                <div id="forgot-password">Forgot password?</div>
            </div>
            <input id="password-input" type="password" placeholder="********">
            
            <label id="repeat-password-label" for="repeat-password-input" style="display: none;">Repeat Password</label>
            <input id="repeat-password-input" type="password" placeholder="********" style="display: none;">
            
            <label id="country-label" for="custom-country-dropdown" style="display: none;">Country</label>
            <div id="custom-country-dropdown" class="custom-dropdown" tabindex="0" style="display: none;">
                <div class="dropdown-selected">
                    <span class="dropdown-icon">▼</span>
                    <div id="country-selected-text">Select your country</div>
                </div>
                <div class="dropdown-options" id="country-options">
                    </div>
            </div>
            <input type="hidden" id="country-input" value="">
            
            <button id="login-button" class="action-button">Login</button>
            
            <div id="login-register-separator">
                <div id="separator-line-left"></div>
                <div id="separator-text">or</div>
                <div id="separator-line-right"></div>
            </div>
            
            <button id="register-button" class="action-button">Register</button>
            
            <div id="back-to-login" style="display: none;">Back to Login</div>
            
            <div id="google-login" class="action-button">
                <div id="google-logo"></div>
                <div id="google-text">Continue with Google</div>
            </div>

            <div id="pfp-upload-container">
                <div id="pfp-preview"></div>
                <div id="pfp-text">Upload your profile picture</div>
                <button id="pfp-upload-button" class="action-button">Select Image</button>
                <button id="pfp-send-button" class="action-button">Next</button>
                <div id="pfp-skip-button">Skip</div>
                <input type="file" id="pfp-file-input" accept="image/*" style="display: none;">
            </div>

            <div id="language-and-theme">
                <div id="language-switcher">
                    <div id="language-switcher-button"></div>
                    <div id="language-switcher-text"></div>
                </div>
                <div id="theme-switcher">
                    <div id="theme-switcher-button"></div>
                    <div id="theme-switcher-text"></div>
                </div>
            </div>
            <div id="copyright">Speedruns is a platform of Konisoft. Made and hosted by Konisoft Indie Game Studio. 2026-2027</div>
        </div>
    </main>
</body>
</html>
